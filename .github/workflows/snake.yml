name: generate snake

on:
  schedule:
    - cron: "0 3 * * *" 
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    # Optional: Forces the runner to use Node 24 right now to clear the warning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Updated to v6 (supports Node 24)
      - name: checkout repository
        uses: actions/checkout@v6

      # Updated to v3.4.1+ (Platane/snk supports latest runtimes)
      - name: generate snake graphics
        uses: Platane/snk@v3
        with:
          github_user_name: s8n0gre
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Updated to v5 (supports Node 24)
      - name: push snake to the output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

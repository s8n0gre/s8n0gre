name: generate snake

on:
  schedule:
    - cron: "0 3 * * *" # Runs every day at 3:00 AM
  workflow_dispatch: # Allows manual trigger from the Actions tab
  push:
    branches:
      - main # Runs whenever you push to main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Use v4 (latest stable) to avoid Node.js deprecation warnings
      - name: checkout repository
        uses: actions/checkout@v4

      # Use v3 (latest stable) for the snake generator
      - name: generate snake graphics
        uses: Platane/snk@v3
        with:
          github_user_name: s8n0gre
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          # Ensure the generator has access to fetch your contribution data
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Deploy using the official GitHub Pages action (v4 is the current standard)
      - name: push snake to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# .github/workflows/pacman.yml
# ┌──────────────────────────────────────────────────────┐
# │  CHROMATIC PACMAN — rainbow contribution devourer    │
# └──────────────────────────────────────────────────────┘
name: "> PACMAN DEVOURER"
on:
  schedule: [{ cron: "0 */12 * * *" }]
  workflow_dispatch:
  push: { branches: [main] }

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "[ STEP 1 ] — Checkout repo"
        uses: actions/checkout@v4

      - name: "[ STEP 2 ] — Generate chromatic pacman animation"
        uses: ghostforge/github-contribution-grid-pacman@v1
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/pacman.svg
            dist/pacman-dark.svg?palette=github-dark
          color_pacman: "#39FF14"
          color_dots:   "#ff0000,#ff7700,#ffff00,#00ff00,#0000ff,#8b00ff"
          color_empty:  "#0d1117"
          color_bg:     "#0d1117"

      - name: "[ STEP 3 ] — Deploy to output branch"
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

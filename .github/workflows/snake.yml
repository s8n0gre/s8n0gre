name: generate snake

on:
schedule:
- cron: "0 3 * * *"
workflow_dispatch:

permissions:
contents: write

jobs:
snake:
runs-on: ubuntu-latest

```
steps:
  - name: checkout repository
    uses: actions/checkout@v4

  - name: generate snake graphics
    uses: Platane/snk@v3
    with:
      github_user_name: s8n0gre
      outputs: |
        dist/snake-dark.svg?palette=github-dark&color_snake=00E5FF&color_dots=#0D1117,#161B22,#1F6FEB,#00E5FF,#7EE787
        dist/snake-light.svg?palette=github-light&color_snake=007CF0&color_dots=#FFFFFF,#EAEEF2,#79C0FF,#007CF0,#0059B3
        dist/snake-grid.svg?color_snake=FF6B6B&color_dots=#0D1117,#2D333B,#FF6B6B,#FFA657,#FFD580

  - name: deploy to branch
    uses: crazy-max/ghaction-github-pages@v4
    with:
      target_branch: output
      build_dir: dist
      commit_message: "update: snake animation"
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```

# .github/workflows/pacman.yml
# ┌──────────────────────────────────────────────────────┐
# │  CHROMATIC PACMAN — real verified action             │
# │  repo: abozanona/pacman-contribution-graph           │
# └──────────────────────────────────────────────────────┘
name: "> PACMAN DEVOURER"
on:
  schedule: [{ cron: "0 */24 * * *" }]
  workflow_dispatch:
  push: { branches: [main] }

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: "[ STEP 1 ] — Generate pacman SVG"
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: "[ STEP 2 ] — Deploy to output branch"
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

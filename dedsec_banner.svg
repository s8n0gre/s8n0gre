<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 860 400" width="860" height="400">
  <foreignObject width="860" height="400">
    <div xmlns="http://www.w3.org/1999/xhtml">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

.root{
  width:860px;
  height:400px;
  background:#040c04;
  font-family:'Courier New',Courier,monospace;
  overflow:hidden;
  position:relative;
}

/* ── SCANLINES ── */
.scanlines{
  position:absolute;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(0,255,65,0.018) 3px,
    rgba(0,255,65,0.018) 4px
  );
  z-index:10;
}

/* ── CRT FLICKER ── */
.flicker{
  position:absolute;
  inset:0;
  pointer-events:none;
  background:rgba(0,255,65,0.035);
  opacity:0;
  z-index:11;
  animation:flicker 11s step-start infinite;
}
@keyframes flicker{
  0%,100%{opacity:0}
  6%{opacity:1}
  6.4%{opacity:0}
  51%{opacity:1}
  51.3%{opacity:0}
}

/* ── MATRIX RAIN ── */
.rain{
  position:absolute;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  z-index:1;
}
.drop{
  position:absolute;
  top:0;
  color:#00ff41;
  font-size:10px;
  line-height:1.35;
  writing-mode:vertical-rl;
  opacity:0.09;
  animation:fall linear infinite;
  letter-spacing:2px;
}
.drop:nth-child(1){left:6px;   animation-duration:3.2s;animation-delay:0s}
.drop:nth-child(2){left:26px;  animation-duration:2.5s;animation-delay:0.7s}
.drop:nth-child(3){left:46px;  animation-duration:3.9s;animation-delay:1.4s}
.drop:nth-child(4){left:66px;  animation-duration:2.9s;animation-delay:0.2s}
.drop:nth-child(5){left:790px; animation-duration:2.7s;animation-delay:0.5s}
.drop:nth-child(6){left:810px; animation-duration:3.5s;animation-delay:1.9s}
.drop:nth-child(7){left:830px; animation-duration:2.3s;animation-delay:1.0s}
.drop:nth-child(8){left:850px; animation-duration:3.1s;animation-delay:0.4s}
@keyframes fall{
  from{transform:translateY(-100px)}
  to{transform:translateY(440px)}
}

/* ── BORDER ── */
.border-box{
  position:absolute;
  top:10px;left:10px;
  width:840px;height:380px;
  border:1px solid rgba(0,255,65,0.7);
  z-index:2;
  animation:border-in 0.5s ease forwards;
}
/* corner ticks */
.border-box::before,.border-box::after{
  content:'';
  position:absolute;
  width:14px;height:14px;
  border-color:#00ff41;
  border-style:solid;
  opacity:0.9;
}
.border-box::before{
  top:-2px;left:-2px;
  border-width:2px 0 0 2px;
}
.border-box::after{
  bottom:-2px;right:-2px;
  border-width:0 2px 2px 0;
}
@keyframes border-in{
  from{clip-path:inset(0 100% 100% 0)}
  to{clip-path:inset(0 0 0 0)}
}

/* ── CONTENT ── */
.content{
  position:absolute;
  top:22px;left:28px;
  width:804px;
  z-index:5;
}

/* ── ASCII BANNER ── */
.banner{
  color:#00ff41;
  font-size:10px;
  line-height:1.38;
  letter-spacing:0.1px;
  white-space:pre;
  text-shadow:0 0 6px rgba(0,255,65,0.7);
  opacity:0;
  animation:fade-in 0.3s ease forwards 0.2s;
}

/* ── SUBTITLE ── */
.subtitle{
  margin-top:5px;
  color:rgba(0,255,65,0.5);
  font-size:10.5px;
  letter-spacing:4px;
  text-transform:uppercase;
  opacity:0;
  animation:fade-in 0.3s ease forwards 1.0s;
}

/* ── DIVIDER ── */
.div{
  margin-top:6px;
  height:1px;
  background:linear-gradient(to right, transparent, rgba(0,255,65,0.4) 15%, rgba(0,255,65,0.4) 85%, transparent);
  opacity:0;
  animation:fade-in 0.2s ease forwards;
}
.div-1{animation-delay:1.1s}
.div-2{animation-delay:3.2s}
.div-3{animation-delay:5.2s}

/* ── BREACH LINES ── */
.breach{margin-top:6px;}
.bl{
  font-size:11px;
  line-height:1.8;
  white-space:nowrap;
  overflow:hidden;
  width:0;
  color:#00ff41;
  animation:typeout 0.55s steps(55,end) forwards;
}
.bl .dim{color:#004d00;}
.bl .ok{color:#00ff41;text-shadow:0 0 5px #00ff41;}
.bl-1{animation-delay:1.3s}
.bl-2{animation-delay:2.0s}
.bl-3{animation-delay:2.7s}
@keyframes typeout{
  from{width:0}
  to{width:100%}
}

/* ── OPERATOR TABLE ── */
.op-table{
  margin-top:6px;
  opacity:0;
  animation:fade-in 0.2s ease forwards 3.4s;
}
.op-row{
  display:flex;
  align-items:baseline;
  font-size:11px;
  line-height:1.85;
  color:#00ff41;
}
.op-k{
  width:110px;
  flex-shrink:0;
  opacity:0.55;
  letter-spacing:1px;
  font-size:10px;
}
.op-sep{
  flex:1;
  overflow:hidden;
  color:#003300;
  white-space:nowrap;
  font-size:10px;
  padding:0 4px;
}
.op-v{
  flex-shrink:0;
  text-align:right;
  letter-spacing:1px;
  font-size:11px;
}

/* ── WARNING ── */
.warn{
  margin-top:7px;
  font-size:10.5px;
  color:#ff4444;
  letter-spacing:0.5px;
  white-space:nowrap;
  overflow:hidden;
  width:0;
  animation:typeout 0.7s steps(70,end) forwards 5.4s;
}

/* ── CURSOR ── */
.cursor{
  display:inline-block;
  width:6px;height:11px;
  background:#00ff41;
  vertical-align:middle;
  margin-left:2px;
  opacity:0;
  animation:blink 0.9s step-start infinite 6.2s;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── SHARED ── */
@keyframes fade-in{from{opacity:0}to{opacity:1}}
</style>

<div class="root">
  <div class="rain">
    <div class="drop">10AF3B</div>
    <div class="drop">E927D4</div>
    <div class="drop">F7C219</div>
    <div class="drop">0BE4A3</div>
    <div class="drop">9B2F6E</div>
    <div class="drop">C4E71A</div>
    <div class="drop">7A3F1D</div>
    <div class="drop">E2B409</div>
  </div>
  <div class="scanlines"></div>
  <div class="flicker"></div>
  <div class="border-box"></div>

  <div class="content">

    <div class="banner"> ██████╗  █████╗  ███╗  ██╗ ██████╗  ██████╗ ██████╗  ███████╗
██╔════╝ ██╔══██╗ ████╗ ██║██╔═══██╗██╔════╝ ██╔══██╗ ██╔════╝
╚█████╗  ╚█████╔╝ ██╔██╗██║██║   ██║██║  ███╗██████╔╝ █████╗
 ╚═══██╗ ██╔══██╗ ██║╚████║██║   ██║██║   ██║██╔══██╗ ██╔══╝
██████╔╝ ╚█████╔╝ ██║ ╚███║╚██████╔╝╚██████╔╝██║  ██║ ███████╗
╚═════╝   ╚════╝  ╚═╝  ╚══╝ ╚═════╝  ╚═════╝ ╚═╝  ╚═╝ ╚══════╝</div>

    <div class="subtitle">software engineering student</div>

    <div class="div div-1"></div>

    <div class="breach">
      <div class="bl bl-1">&gt;  BREACH INITIATED<span class="dim">  ···································</span><span class="ok">  [OK]</span></div>
      <div class="bl bl-2">&gt;  TARGET  ········  github.com/s8n0gre<span class="dim">  ·················</span><span class="ok">  [OK]</span></div>
      <div class="bl bl-3">&gt;  ACCESS  ········  ROOT GRANTED<span class="dim">  ·························</span><span class="ok">  [OK]</span></div>

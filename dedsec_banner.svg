<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 860 480" width="860" height="480">
  <foreignObject width="860" height="480">
    <div xmlns="http://www.w3.org/1999/xhtml">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

.root {
  width: 860px;
  height: 480px;
  background: #050d05;
  font-family: 'Courier New', Courier, monospace;
  overflow: hidden;
  position: relative;
}

/* в”Ђв”Ђ MATRIX RAIN в”Ђв”Ђ */
.rain {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  overflow: hidden;
}
.drop {
  position: absolute;
  top: 0;
  color: #00ff41;
  font-size: 11px;
  line-height: 1.4;
  writing-mode: vertical-rl;
  opacity: 0.13;
  animation: fall linear infinite;
}
.drop:nth-child(1)  { left: 12px;  animation-duration: 3.1s; animation-delay: 0s;    }
.drop:nth-child(2)  { left: 35px;  animation-duration: 2.4s; animation-delay: 0.6s;  }
.drop:nth-child(3)  { left: 58px;  animation-duration: 3.8s; animation-delay: 1.2s;  }
.drop:nth-child(4)  { left: 800px; animation-duration: 2.8s; animation-delay: 0.3s;  }
.drop:nth-child(5)  { left: 825px; animation-duration: 3.4s; animation-delay: 1.8s;  }
.drop:nth-child(6)  { left: 775px; animation-duration: 2.2s; animation-delay: 0.9s;  }
.drop:nth-child(7)  { left: 748px; animation-duration: 3.6s; animation-delay: 0.4s;  }
.drop:nth-child(8)  { left: 845px; animation-duration: 2.6s; animation-delay: 1.5s;  }

@keyframes fall {
  from { transform: translateY(-120px); }
  to   { transform: translateY(520px);  }
}

/* в”Ђв”Ђ OUTER BORDER в”Ђв”Ђ */
.border-box {
  position: absolute;
  top: 14px; left: 14px;
  width: 832px; height: 452px;
  border: 1px solid #00ff41;
  opacity: 0.85;
  animation: border-in 0.4s ease forwards;
}
@keyframes border-in {
  from { clip-path: inset(0 100% 100% 0); }
  to   { clip-path: inset(0 0% 0% 0); }
}

/* в”Ђв”Ђ SCANLINES в”Ђв”Ђ */
.scanlines {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(0,255,65,0.025) 3px,
    rgba(0,255,65,0.025) 4px
  );
}

/* в”Ђв”Ђ FLICKER в”Ђв”Ђ */
.flicker {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  animation: flicker 9s step-start infinite;
  background: rgba(0,255,65,0.04);
  opacity: 0;
}
@keyframes flicker {
  0%,100%  { opacity: 0; }
  7%       { opacity: 1; }
  7.5%     { opacity: 0; }
  47%      { opacity: 0; }
  47.3%    { opacity: 1; }
  47.6%    { opacity: 0; }
}

/* в”Ђв”Ђ CONTENT WRAPPER в”Ђв”Ђ */
.content {
  position: absolute;
  top: 24px; left: 26px;
  width: 808px;
}

/* в”Ђв”Ђ s8n0gre ASCII BANNER в”Ђв”Ђ */
.banner-s8 {
  color: #00ff41;
  font-size: 10.8px;
  line-height: 1.42;
  letter-spacing: 0.3px;
  white-space: pre;
  text-shadow: 0 0 8px #00ff41, 0 0 2px #00ff41;
  opacity: 0;
  animation: reveal 0.2s ease forwards;
  animation-delay: 0.3s;
}

/* в”Ђв”Ђ DIVIDER в”Ђв”Ђ */
.divider {
  color: #00ff41;
  font-size: 11px;
  opacity: 0.45;
  white-space: pre;
  opacity: 0;
  animation: reveal 0.1s ease forwards;
  animation-delay: 1.2s;
}

/* в”Ђв”Ђ DEDSEC ASCII BANNER в”Ђв”Ђ */
.banner-dd {
  color: #39ff14;
  font-size: 10.8px;
  line-height: 1.42;
  letter-spacing: 0.3px;
  white-space: pre;
  text-shadow: 0 0 10px #39ff14, 0 0 3px #39ff14;
  opacity: 0;
  animation: reveal 0.2s ease forwards;
  animation-delay: 1.4s;
}

/* в”Ђв”Ђ DIVIDER 2 в”Ђв”Ђ */
.divider2 {
  color: #00ff41;
  font-size: 11px;
  opacity: 0;
  animation: reveal 0.1s ease forwards;
  animation-delay: 2.1s;
}

/* в”Ђв”Ђ BREACH LINES в”Ђв”Ђ */
.breach-block {
  margin-top: 2px;
}
.breach-line {
  color: #00ff41;
  font-size: 11.5px;
  line-height: 1.75;
  white-space: pre;
  overflow: hidden;
  width: 0;
  animation: typeout 0.6s steps(60, end) forwards;
}
.breach-line .ok  { color: #00ff41; text-shadow: 0 0 6px #00ff41; }
.breach-line .dots { color: #005500; }
.bl1 { animation-delay: 2.2s; }
.bl2 { animation-delay: 2.9s; }
.bl3 { animation-delay: 3.6s; }
.bl4 { animation-delay: 4.3s; }
.bl5 { animation-delay: 5.0s; }

@keyframes typeout {
  from { width: 0; }
  to   { width: 100%; }
}

/* в”Ђв”Ђ DIVIDER 3 в”Ђв”Ђ */
.divider3 {
  color: #00ff41;
  font-size: 11px;
  opacity: 0;
  animation: reveal 0.1s ease forwards;
  animation-delay: 5.6s;
}

/* в”Ђв”Ђ OPERATOR TABLE в”Ђв”Ђ */
.op-table {
  margin-top: 3px;
  opacity: 0;
  animation: reveal 0.15s ease forwards;
  animation-delay: 5.7s;
}
.op-row {
  display: flex;
  font-size: 11.5px;
  line-height: 1.75;
  color: #00ff41;
}
.op-key  { width: 96px; opacity: 0.6; }
.op-line { flex: 1; color: #003a00; overflow: hidden; white-space: nowrap; }
.op-val  { width: 180px; text-align: right; }

/* в”Ђв”Ђ WARNING в”Ђв”Ђ */
.warning {
  margin-top: 4px;
  color: #ff4444;
  font-size: 11px;
  opacity: 0;
  animation: reveal 0.2s ease forwards, pulse-warn 1.5s ease-in-out 6.6s infinite;
  animation-delay: 6.4s, 6.6s;
}
@keyframes pulse-warn {
  0%,100% { opacity: 0.85; }
  50%     { opacity: 0.3;  }
}

/* в”Ђв”Ђ CURSOR в”Ђв”Ђ */
.cursor {
  display: inline-block;
  width: 7px;
  height: 13px;
  background: #00ff41;
  vertical-align: middle;
  animation: blink 0.85s step-start infinite;
  animation-delay: 6.5s;
  opacity: 0;
}
@keyframes blink {
  0%,100% { opacity: 1; }
  50%     { opacity: 0; }
}

/* в”Ђв”Ђ SHARED в”Ђв”Ђ */
@keyframes reveal {
  from { opacity: 0; }
  to   { opacity: 1; }
}
</style>


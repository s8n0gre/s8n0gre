<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 860 400" width="860" height="400">
  <foreignObject width="860" height="400">
    <div xmlns="http://www.w3.org/1999/xhtml">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
.root{
  width:860px;height:400px;
  background:#0a0a0f;
  font-family:'Courier New',Courier,monospace;
  overflow:hidden;position:relative;
}
.scanlines{
  position:absolute;inset:0;pointer-events:none;z-index:10;
  background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(255,255,255,0.012) 3px,rgba(255,255,255,0.012) 4px);
}
.flicker{
  position:absolute;inset:0;pointer-events:none;
  background:rgba(255,255,255,0.025);opacity:0;z-index:11;
  animation:flicker 12s step-start infinite;
}
@keyframes flicker{0%,100%{opacity:0}6%{opacity:1}6.4%{opacity:0}54%{opacity:1}54.2%{opacity:0}}
/* snow/rain particles on edges */
.rain{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1;}
.drop{
  position:absolute;top:0;
  color:rgba(255,255,255,0.18);
  font-size:10px;line-height:1.35;
  writing-mode:vertical-rl;
  animation:fall linear infinite;letter-spacing:2px;
}
.drop:nth-child(1){left:6px;  animation-duration:3.4s;animation-delay:0s}
.drop:nth-child(2){left:24px; animation-duration:2.6s;animation-delay:0.8s}
.drop:nth-child(3){left:44px; animation-duration:4.0s;animation-delay:1.5s}
.drop:nth-child(4){left:62px; animation-duration:3.0s;animation-delay:0.3s}
.drop:nth-child(5){left:792px;animation-duration:2.8s;animation-delay:0.6s}
.drop:nth-child(6){left:812px;animation-duration:3.6s;animation-delay:2.0s}
.drop:nth-child(7){left:832px;animation-duration:2.4s;animation-delay:1.1s}
.drop:nth-child(8){left:850px;animation-duration:3.2s;animation-delay:0.4s}
@keyframes fall{from{transform:translateY(-100px)}to{transform:translateY(440px)}}
/* border */
.border-box{
  position:absolute;top:10px;left:10px;
  width:840px;height:380px;
  border:1px solid rgba(255,255,255,0.55);
  z-index:2;animation:border-in 0.5s ease forwards;
}
.border-box::before,.border-box::after{
  content:'';position:absolute;
  width:14px;height:14px;
  border-color:rgba(255,255,255,0.9);border-style:solid;
}
.border-box::before{top:-2px;left:-2px;border-width:2px 0 0 2px;}
.border-box::after{bottom:-2px;right:-2px;border-width:0 2px 2px 0;}
@keyframes border-in{from{clip-path:inset(0 100% 100% 0)}to{clip-path:inset(0 0 0 0)}}
/* content */
.content{position:absolute;top:22px;left:28px;width:804px;z-index:5;}
/* banner */
.banner{
  color:#ffffff;
  font-size:10px;line-height:1.38;letter-spacing:0.1px;white-space:pre;
  text-shadow:0 0 8px rgba(255,255,255,0.6),0 0 2px rgba(255,255,255,0.4);
  opacity:0;animation:fade-in 0.3s ease forwards 0.2s;
}
/* subtitle */
.subtitle{
  margin-top:5px;
  color:rgba(255,255,255,0.4);
  font-size:10.5px;letter-spacing:4px;
  opacity:0;animation:fade-in 0.3s ease forwards 1.0s;
}
/* dividers */
.div{
  margin-top:6px;height:1px;
  background:linear-gradient(to right,transparent,rgba(255,255,255,0.3) 15%,rgba(255,255,255,0.3) 85%,transparent);
  opacity:0;animation:fade-in 0.2s ease forwards;
}
.div-1{animation-delay:1.1s}.div-2{animation-delay:3.2s}.div-3{animation-delay:5.2s}
/* breach lines */
.breach{margin-top:6px;}
.bl{
  font-size:11px;line-height:1.8;white-space:nowrap;overflow:hidden;
  width:0;color:#ffffff;animation:typeout 0.55s steps(55,end) forwards;
}
.bl .dim{color:rgba(255,255,255,0.2);}
.bl .ok{color:#ffffff;text-shadow:0 0 5px rgba(255,255,255,0.8);}
.bl-1{animation-delay:1.3s}.bl-2{animation-delay:2.0s}.bl-3{animation-delay:2.7s}
@keyframes typeout{from{width:0}to{width:100%}}
/* operator table */
.op-table{margin-top:6px;opacity:0;animation:fade-in 0.2s ease forwards 3.4s;}
.op-row{display:flex;align-items:baseline;font-size:11px;line-height:1.85;color:#ffffff;}
.op-k{width:110px;flex-shrink:0;opacity:0.45;letter-spacing:1px;font-size:10px;}
.op-sep{flex:1;overflow:hidden;color:rgba(255,255,255,0.15);white-space:nowrap;font-size:10px;padding:0 4px;}
.op-v{flex-shrink:0;text-align:right;letter-spacing:1px;font-size:11px;}
/* warning */
.warn{
  margin-top:7px;font-size:10.5px;color:rgba(255,255,255,0.5);
  letter-spacing:0.5px;white-space:nowrap;overflow:hidden;
  width:0;animation:typeout 0.7s steps(70,end) forwards 5.4s;
}
/* cursor */
.cursor{
  display:inline-block;width:6px;height:11px;
  background:#ffffff;vertical-align:middle;margin-left:2px;
  opacity:0;animation:blink 0.9s step-start infinite 6.2s;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
</style>
<div class="root">
  <div class="rain">
    <div class="drop">·∴·∵·</div>
    <div class="drop">∵·∴··</div>
    <div class="drop">··∴·∵</div>
    <div class="drop">∴··∵·</div>
    <div class="drop">·∵∴··</div>
    <div class="drop">∵··∴·</div>
    <div class="drop">··∵·∴</div>
    <div class="drop">∴·∵··</div>
  </div>
  <div class="scanlines"></div>
  <div class="flicker"></div>
  <div class="border-box"></div>
  <div class="content">
    <div class="banner"> ██████╗  █████╗  ███╗  ██╗ ██████╗  ██████╗ ██████╗  ███████╗
██╔════╝ ██╔══██╗ ████╗ ██║██╔═══██╗██╔════╝ ██╔══██╗ ██╔════╝
╚█████╗  ╚█████╔╝ ██╔██╗██║██║   ██║██║  ███╗██████╔╝ █████╗
 ╚═══██╗ ██╔══██╗ ██║╚████║██║   ██║██║   ██║██╔══██╗ ██╔══╝
██████╔╝ ╚█████╔╝ ██║ ╚███║╚██████╔╝╚██████╔╝██║  ██║ ███████╗
╚═════╝   ╚════╝  ╚═╝  ╚══╝ ╚═════╝  ╚═════╝ ╚═╝  ╚═╝ ╚══════╝</div>
    <div class="subtitle">software engineering student</div>
    <div class="div div-1"></div>
    <div class="breach">
      <div class="bl bl-1">&gt;  BREACH INITIATED<span class="dim">  ···································</span><span class="ok">  [OK]</span></div>
      <div class="bl bl-2">&gt;  TARGET  ········  github.com/s8n0gre<span class="dim">  ·················</span><span class="ok">  [OK]</span></div>
      <div class="bl bl-3">&gt;  ACCESS  ········  ROOT GRANTED<span class="dim">  ·························</span><span class="ok">  [OK]</span></div>
    </div>
    <div class="div div-2"></div>
    <div class="op-table">
      <div class="op-row"><span class="op-k">OPERATOR</span><span class="op-sep">···············································</span><span class="op-v">s8n0gre</span></div>
      <div class="op-row"><span class="op-k">ROLE</span><span class="op-sep">···············································</span><span class="op-v">SWE STUDENT</span></div>
      <div class="op-row"><span class="op-k">MISSION</span><span class="op-sep">···············································</span><span class="op-v">DSA  ×  SYSTEMS</span></div>
      <div class="op-row"><span class="op-k">STATUS</span><span class="op-sep">···············································</span><span class="op-v">ALWAYS LEARNING</span></div>
    </div>
    <div class="div div-3"></div>
    <div class="warn">[ SYS ]  Connection established.  Welcome back, operator.  The network is yours.<span class="cursor"></span></div>
  </div>
</div>
    </div>
  </foreignObject>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 860 400" width="860" height="400">
  <foreignObject width="860" height="400">
    <div xmlns="http://www.w3.org/1999/xhtml">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
.root{
  width:860px;height:400px;
  background:#0a0a0f;
  font-family:'Courier New',Courier,monospace;
  overflow:hidden;position:relative;
}

/* ── CRT SCANLINES ── */
.scanlines{
  position:absolute;inset:0;pointer-events:none;z-index:12;
  background:repeating-linear-gradient(to bottom,
    transparent 0px,transparent 3px,
    rgba(255,255,255,0.010) 3px,rgba(255,255,255,0.010) 4px);
}
.flicker{
  position:absolute;inset:0;pointer-events:none;z-index:13;
  background:rgba(255,255,255,0.020);opacity:0;
  animation:flicker 11s step-start infinite;
}
@keyframes flicker{
  0%,100%{opacity:0}6%{opacity:1}6.3%{opacity:0}53%{opacity:1}53.2%{opacity:0}
}

/* ── BORDER ── */
.border-box{
  position:absolute;top:10px;left:10px;
  width:840px;height:380px;
  border:1px solid rgba(255,255,255,0.45);
  z-index:5;
  animation:border-in 0.5s ease forwards;
}
.border-box::before,.border-box::after{
  content:'';position:absolute;
  width:14px;height:14px;
  border-color:rgba(255,255,255,0.85);border-style:solid;
}
.border-box::before{top:-2px;left:-2px;border-width:2px 0 0 2px;}
.border-box::after {bottom:-2px;right:-2px;border-width:0 2px 2px 0;}
@keyframes border-in{from{clip-path:inset(0 100% 100% 0)}to{clip-path:inset(0 0 0 0)}}

/* ── VERTICAL SEPARATOR ── */
.vline{
  position:absolute;
  top:18px;right:266px;
  width:1px;height:364px;
  background:linear-gradient(to bottom,
    transparent 0%,
    rgba(255,255,255,0.16) 18%,
    rgba(255,255,255,0.16) 82%,
    transparent 100%);
  z-index:6;opacity:0;
  animation:fade-in 0.3s ease forwards 0.8s;
}

/* ── WATERFALL PANEL ── */
.wf-panel{
  position:absolute;
  top:0;right:0;
  width:258px;height:400px;
  overflow:hidden;z-index:3;
  /* left-edge fade so it blends into the terminal */
  -webkit-mask-image:linear-gradient(to right,transparent 0%,rgba(0,0,0,0.5) 22%,#000 55%);
  mask-image:linear-gradient(to right,transparent 0%,rgba(0,0,0,0.5) 22%,#000 55%);
}

/* individual falling stream */
.wf{
  position:absolute;
  top:0;
  writing-mode:vertical-lr;
  text-orientation:mixed;
  font-size:11px;
  line-height:1;
  letter-spacing:3px;
  white-space:nowrap;
  animation:wfall linear infinite;
  user-select:none;
}
/* bright leading character */
.wf::first-letter{
  color:rgba(255,255,255,0.95);
  text-shadow:0 0 7px rgba(255,255,255,0.9),0 0 14px rgba(255,255,255,0.4);
}

/* 16 columns, varying speed/opacity/delay */
.wf:nth-child(1) {left:2px;  color:rgba(255,255,255,0.26);animation-duration:2.8s;animation-delay:0.0s;}
.wf:nth-child(2) {left:16px; color:rgba(255,255,255,0.17);animation-duration:3.5s;animation-delay:0.5s;}
.wf:nth-child(3) {left:30px; color:rgba(255,255,255,0.22);animation-duration:2.3s;animation-delay:1.2s;}
.wf:nth-child(4) {left:44px; color:rgba(255,255,255,0.14);animation-duration:4.0s;animation-delay:0.8s;}
.wf:nth-child(5) {left:58px; color:rgba(255,255,255,0.20);animation-duration:2.6s;animation-delay:1.9s;}
.wf:nth-child(6) {left:72px; color:rgba(255,255,255,0.25);animation-duration:3.2s;animation-delay:0.3s;}
.wf:nth-child(7) {left:86px; color:rgba(255,255,255,0.16);animation-duration:2.9s;animation-delay:1.6s;}
.wf:nth-child(8) {left:100px;color:rgba(255,255,255,0.21);animation-duration:3.7s;animation-delay:1.0s;}
.wf:nth-child(9) {left:114px;color:rgba(255,255,255,0.18);animation-duration:2.4s;animation-delay:2.2s;}
.wf:nth-child(10){left:128px;color:rgba(255,255,255,0.24);animation-duration:3.1s;animation-delay:0.7s;}
.wf:nth-child(11){left:142px;color:rgba(255,255,255,0.14);animation-duration:2.7s;animation-delay:1.4s;}
.wf:nth-child(12){left:156px;color:rgba(255,255,255,0.20);animation-duration:3.4s;animation-delay:0.2s;}
.wf:nth-child(13){left:170px;color:rgba(255,255,255,0.26);animation-duration:2.2s;animation-delay:1.8s;}
.wf:nth-child(14){left:184px;color:rgba(255,255,255,0.15);animation-duration:3.8s;animation-delay:0.6s;}
.wf:nth-child(15){left:198px;color:rgba(255,255,255,0.22);animation-duration:2.5s;animation-delay:2.4s;}
.wf:nth-child(16){left:214px;color:rgba(255,255,255,0.19);animation-duration:3.0s;animation-delay:1.1s;}

@keyframes wfall{
  from{transform:translateY(-450px)}
  to  {transform:translateY(450px)}
}

/* splash ripple at the bottom */
.splash{
  position:absolute;
  bottom:16px;right:6px;
  width:248px;
  color:rgba(255,255,255,0.16);
  font-size:10px;letter-spacing:2px;
  text-align:center;z-index:4;
  animation:splash 2.6s ease-in-out infinite;
}
@keyframes splash{0%,100%{opacity:0.12;letter-spacing:2px}50%{opacity:0.28;letter-spacing:3px}}

/* lizard caption */
.lizard{
  position:absolute;
  bottom:28px;right:10px;
  color:rgba(255,255,255,0.20);
  font-size:8.5px;letter-spacing:1.5px;
  text-align:center;width:244px;
  z-index:4;opacity:0;
  animation:fade-in 0.4s ease forwards 7.0s;
}

/* ── TERMINAL CONTENT ── */
.content{
  position:absolute;
  top:22px;left:26px;
  width:562px;
  z-index:7;
}
.banner{
  color:#ffffff;
  font-size:9.2px;line-height:1.38;letter-spacing:0.05px;
  white-space:pre;
  text-shadow:0 0 8px rgba(255,255,255,0.5),0 0 2px rgba(255,255,255,0.25);
  opacity:0;animation:fade-in 0.3s ease forwards 0.2s;
}
.subtitle{
  margin-top:5px;
  color:rgba(255,255,255,0.35);
  font-size:10px;letter-spacing:4px;
  opacity:0;animation:fade-in 0.3s ease forwards 1.0s;
}
.div{
  margin-top:6px;height:1px;
  background:linear-gradient(to right,
    rgba(255,255,255,0.25) 0%,rgba(255,255,255,0.25) 80%,transparent 100%);
  opacity:0;animation:fade-in 0.2s ease forwards;
}
.div-1{animation-delay:1.1s}
.div-2{animation-delay:3.2s}
.div-3{animation-delay:5.2s}

.breach{margin-top:6px;}
.bl{
  font-size:10.5px;line-height:1.82;
  white-space:nowrap;overflow:hidden;
  width:0;color:#ffffff;
  animation:typeout 0.52s steps(52,end) forwards;
}
.bl .dim{color:rgba(255,255,255,0.17);}
.bl .ok {color:#ffffff;text-shadow:0 0 6px rgba(255,255,255,0.85);}
.bl-1{animation-delay:1.3s}
.bl-2{animation-delay:2.0s}
.bl-3{animation-delay:2.7s}
@keyframes typeout{from{width:0}to{width:100%}}

.op-table{margin-top:6px;opacity:0;animation:fade-in 0.2s ease forwards 3.4s;}
.op-row{display:flex;align-items:baseline;font-size:10.5px;line-height:1.85;color:#ffffff;}
.op-k  {width:88px;flex-shrink:0;opacity:0.40;letter-spacing:1px;font-size:9.5px;}
.op-sep{flex:1;overflow:hidden;color:rgba(255,255,255,0.12);white-space:nowrap;padding:0 3px;font-size:9.5px;}
.op-v  {flex-shrink:0;text-align:right;letter-spacing:1px;font-size:10.5px;}

.warn{
  margin-top:7px;font-size:10px;color:rgba(255,255,255,0.42);
  white-space:nowrap;overflow:hidden;
  width:0;animation:typeout 0.62s steps(62,end) forwards 5.4s;
}
.cursor{
  display:inline-block;width:6px;height:10px;
  background:#ffffff;vertical-align:middle;margin-left:2px;
  opacity:0;animation:blink 0.9s step-start infinite 6.2s;
}
@keyframes blink  {0%,100%{opacity:1}50%{opacity:0}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
</style>

